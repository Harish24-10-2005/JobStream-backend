services:
  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      REDIS_URL: ${DOCKER_REDIS_URL:?Set DOCKER_REDIS_URL}
      CELERY_BROKER_URL: ${DOCKER_REDIS_URL:?Set DOCKER_REDIS_URL}
      CELERY_RESULT_BACKEND: ${DOCKER_REDIS_URL:?Set DOCKER_REDIS_URL}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      REDIS_URL: ${DOCKER_REDIS_URL:?Set DOCKER_REDIS_URL}
      CELERY_BROKER_URL: ${DOCKER_REDIS_URL:?Set DOCKER_REDIS_URL}
      CELERY_RESULT_BACKEND: ${DOCKER_REDIS_URL:?Set DOCKER_REDIS_URL}
    depends_on:
      backend:
        condition: service_healthy
    command: ["celery", "-A", "src.worker.celery_app", "worker", "-Q", "browser", "--loglevel=info"]
